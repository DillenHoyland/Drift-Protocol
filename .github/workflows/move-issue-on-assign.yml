name: Move Issue to In Progress

on:
  issues:
    types: [assigned, edited]

permissions:
  contents: read
  issues: read

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Move issue to "In Progress"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BRANCHFLOW_PAT }}
          script: |
            // Only run on "edited" when assignees changed
            if (context.eventName === "issues" && context.payload.action === "edited") {
              const changes = context.payload.changes;
              if (!changes || !changes.assignees) {
                console.log("Not an assignee change, skipping.");
                return;
              }
            }

            const orgLogin = context.repo.owner;
            const projectNumber = 1;

            const statusFieldName = "Status";
            const targetStatus = "In Progress";

            const startDateFieldName = "Start date"; // <-- must match your Project field name exactly

            const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
            const issueNodeId = context.payload.issue.node_id;

            // 1) Load project, Status field (single select) + Start date field (date)
            const projectQuery = `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                        ... on ProjectV2FieldCommon {
                          id
                          name
                          dataType
                        }
                      }
                    }
                  }
                }
              }
            `;

            const projectResp = await github.graphql(projectQuery, { org: orgLogin, number: projectNumber });
            const project = projectResp.organization?.projectV2;

            if (!project) {
              core.setFailed(`Project not found: org=${orgLogin} number=${projectNumber}`);
              return;
            }

            const statusField = project.fields.nodes.find(f => f?.name === statusFieldName && f?.options);
            if (!statusField) {
              core.setFailed(`Field not found: "${statusFieldName}"`);
              return;
            }

            const statusOption = statusField.options.find(o => o.name === targetStatus);
            if (!statusOption) {
              core.setFailed(`Status option not found: "${targetStatus}"`);
              return;
            }

            const startDateField = project.fields.nodes.find(f => f?.name === startDateFieldName && f?.dataType === "DATE");
            if (!startDateField) {
              console.log(`Start date field "${startDateFieldName}" not found (DATE). Skipping start date set.`);
            }

            // 2) Find this issue's project item
            const itemQuery = `
              query($id: ID!) {
                node(id: $id) {
                  ... on Issue {
                    projectItems(first: 50) {
                      nodes {
                        id
                        project { ... on ProjectV2 { number } }
                        fieldValues(first: 50) {
                          nodes {
                            ... on ProjectV2ItemFieldDateValue {
                              date
                              field { ... on ProjectV2FieldCommon { id name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const itemResp = await github.graphql(itemQuery, { id: issueNodeId });
            const projectItem = itemResp.node?.projectItems?.nodes?.find(n => n.project?.number === projectNumber);

            if (!projectItem) {
              core.setFailed(`Issue is not in Project #${projectNumber}. Add it to the project first.`);
              return;
            }

            // 3) Update Status -> In Progress
            const updateMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: $value
                  }
                ) { projectV2Item { id } }
              }
            `;

            await github.graphql(updateMutation, {
              projectId: project.id,
              itemId: projectItem.id,
              fieldId: statusField.id,
              value: { singleSelectOptionId: statusOption.id },
            });

            console.log(`✅ Moved to "${targetStatus}" in Project #${projectNumber}.`);

            // 4) Set Start date only if empty
            if (startDateField) {
              const existingStart = (projectItem.fieldValues?.nodes || [])
                .find(v => v?.field?.name === startDateFieldName)?.date;

              if (existingStart) {
                console.log(`Start date already set (${existingStart}), leaving it.`);
              } else {
                await github.graphql(updateMutation, {
                  projectId: project.id,
                  itemId: projectItem.id,
                  fieldId: startDateField.id,
                  value: { date: today },
                });
                console.log(`📅 Set Start date to ${today}`);
              }
            }
