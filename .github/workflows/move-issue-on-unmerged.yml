name: Move Issue on Review Outcome

on:
  pull_request_review:
    types: [submitted]

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues based on review state
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BRANCHFLOW_PAT }}
          script: |
            const orgLogin = context.repo.owner;
            const projectNumber = 1;
            const fieldName = "Status";

            const reviewState = (context.payload.review.state || "").toLowerCase();
            let targetStatus = null;

            if (reviewState === "changes_requested") targetStatus = "In Progress";
            if (reviewState === "approved") targetStatus = "In Review";

            if (!targetStatus) {
              console.log(`No action for review state: ${reviewState}`);
              return;
            }

            const prNumber = context.payload.pull_request.number;

            // 1) Get issues this PR will close (works for UI-linked issues + "Closes #")
            const closingIssuesQuery = `
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$number) {
                    closingIssuesReferences(first: 20) {
                      nodes { id number }
                    }
                  }
                }
              }
            `;

            const closingResp = await github.graphql(closingIssuesQuery, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber,
            });

            const issues = closingResp.repository.pullRequest.closingIssuesReferences.nodes;
            if (!issues.length) {
              console.log("No closing issues linked to this PR.");
              return;
            }

            // 2) Load project + Status field
            const projectQuery = `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const projectResp = await github.graphql(projectQuery, { org: orgLogin, number: projectNumber });
            const project = projectResp.organization?.projectV2;
            if (!project) { core.setFailed("Project not found"); return; }

            const statusField = project.fields.nodes.find(f => f?.name === fieldName);
            const statusOption = statusField?.options?.find(o => o.name === targetStatus);
            if (!statusField || !statusOption) { core.setFailed(`Status field/option not found: ${targetStatus}`); return; }

            // 3) Move each linked issue’s project item
            const itemQuery = `
              query($id: ID!) {
                node(id: $id) {
                  ... on Issue {
                    projectItems(first: 50) {
                      nodes {
                        id
                        project { ... on ProjectV2 { number } }
                      }
                    }
                  }
                }
              }
            `;

            const updateMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: { singleSelectOptionId: $optionId }
                  }
                ) { projectV2Item { id } }
              }
            `;

            for (const issue of issues) {
              const itemResp = await github.graphql(itemQuery, { id: issue.id });
              const projectItem = itemResp.node?.projectItems?.nodes?.find(n => n.project?.number === projectNumber);

              if (!projectItem) {
                console.log(`Issue #${issue.number} not in project - skipping`);
                continue;
              }

              await github.graphql(updateMutation, {
                projectId: project.id,
                itemId: projectItem.id,
                fieldId: statusField.id,
                optionId: statusOption.id,
              });

              console.log(`✅ Moved issue #${issue.number} to ${targetStatus}`);
            }